<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Registration System{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.0/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --primary-hover: #3a56d4;
            --secondary: #6c757d;
            --accent: #2ec4b6;
            --bg-light: #f8f9fa;
            --card-shadow: 0 2px 12px rgba(0,0,0,0.08);
        }
        body {
            background-color: var(--bg-light);
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            min-height: 100vh;
        }
        .navbar {
            background-color: #1a1a2e !important;
            padding: 0.8rem 0;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .navbar-brand {
            font-weight: 700;
            font-size: 1.3rem;
            letter-spacing: -0.3px;
        }
        .navbar-brand i {
            color: var(--accent);
        }
        .nav-link {
            font-weight: 500;
            padding: 0.5rem 1rem !important;
            border-radius: 6px;
            margin: 0 2px;
            transition: background-color 0.2s;
        }
        .nav-link:hover {
            background-color: rgba(255,255,255,0.1);
        }
        .nav-link.active {
            background-color: rgba(255,255,255,0.15);
        }
        .page-header {
            margin-bottom: 1.5rem;
        }
        .page-header h2 {
            font-weight: 700;
            color: #1a1a2e;
            font-size: 1.6rem;
        }
        .page-header p {
            color: var(--secondary);
            margin-bottom: 0;
        }
        .card {
            border: none;
            border-radius: 12px;
            box-shadow: var(--card-shadow);
            overflow: hidden;
        }
        .card-header {
            background-color: #fff;
            border-bottom: 2px solid var(--bg-light);
            padding: 1.2rem 1.5rem;
        }
        .card-header h4 {
            margin: 0;
            font-weight: 700;
            font-size: 1.15rem;
            color: #1a1a2e;
        }
        .card-body {
            padding: 1.5rem;
        }
        .form-label {
            font-weight: 600;
            font-size: 0.875rem;
            color: #495057;
            margin-bottom: 0.35rem;
        }
        .form-control, .form-select {
            border-radius: 8px;
            border: 1.5px solid #dee2e6;
            padding: 0.6rem 0.85rem;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .form-control:focus, .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(67,97,238,0.15);
        }
        .btn {
            border-radius: 8px;
            font-weight: 600;
            padding: 0.6rem 1.5rem;
            transition: all 0.2s;
        }
        .btn-primary {
            background-color: var(--primary);
            border-color: var(--primary);
        }
        .btn-primary:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(67,97,238,0.3);
        }
        .btn-success {
            background-color: var(--accent);
            border-color: var(--accent);
        }
        .btn-success:hover {
            background-color: #26a69a;
            border-color: #26a69a;
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(46,196,182,0.3);
        }
        .btn-info {
            background-color: var(--primary);
            border-color: var(--primary);
            color: #fff;
        }
        .btn-info:hover {
            background-color: var(--primary-hover);
            border-color: var(--primary-hover);
            color: #fff;
            transform: translateY(-1px);
        }
        .table {
            border-radius: 8px;
            overflow: hidden;
        }
        .table thead th {
            background-color: #1a1a2e;
            color: #fff;
            font-weight: 600;
            font-size: 0.85rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 0.85rem 1rem;
            border: none;
        }
        .table tbody td {
            padding: 0.8rem 1rem;
            vertical-align: middle;
            border-color: #f0f0f0;
        }
        .table-striped tbody tr:nth-of-type(odd) {
            background-color: rgba(67,97,238,0.03);
        }
        .table tbody tr:hover {
            background-color: rgba(67,97,238,0.06);
        }
        .alert {
            border-radius: 10px;
            border: none;
            font-weight: 500;
        }
        .alert-success {
            background-color: #d1fae5;
            color: #065f46;
        }
        .alert-warning {
            background-color: #fef3c7;
            color: #92400e;
        }
        .footer {
            margin-top: 3rem;
            padding: 1.5rem 0;
            text-align: center;
            color: #adb5bd;
            font-size: 0.85rem;
        }
    </style>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark mb-4">
        <div class="container">
            <a class="navbar-brand" href="{% url 'student_register' %}">
                <i class="bi bi-mortarboard-fill me-2"></i>Registration System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <div class="navbar-nav ms-auto">
                    <a class="nav-link" href="{% url 'student_register' %}">
                        <i class="bi bi-person-plus me-1"></i>Register Student
                    </a>
                    <a class="nav-link" href="{% url 'course_register' %}">
                        <i class="bi bi-journal-plus me-1"></i>Enroll in Course
                    </a>
                    <a class="nav-link" href="{% url 'course_report' %}">
                        <i class="bi bi-clipboard-data me-1"></i>Course Report
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        {% if messages %}
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }} alert-dismissible fade show" role="alert">
            <i class="bi bi-check-circle me-2"></i>{{ message }}
            <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
        </div>
        {% endfor %}
        {% endif %}
        {% block content %}{% endblock %}
    </div>

    <div class="footer">
        <div class="container">
            <span>&copy; 2026 Registration System</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Highlight active nav link
        document.querySelectorAll('.nav-link').forEach(link => {
            if (link.href === window.location.href) link.classList.add('active');
        });
    </script>
</body>
</html>
